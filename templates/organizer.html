<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Кабинет организатора</title>
    <link rel='stylesheet' href='/static/css/style.css'>
</head>
<body>
<header>
    <nav class='nav-left'>
        <a href='/index'><span class='nav-dot'></span> Главная страница</a>
        <a href='/events'><span class='nav-dot'></span> Записи на мероприятия</a>
    </nav>
    <div class='logo'>
        <img src='/static/img/logo.png' alt='Логотип'>
    </div>
    <nav class='nav-right' id='nav-right'>
        <a href='/organizer'><span class='nav-dot'></span> Мои мероприятия</a>
        <a href='/apply'><span class='nav-dot'></span> Оставление заявки</a>
        <a href='/profile'><span class='nav-dot'></span> Личный кабинет</a>
    </nav>
</header>

<div class='page-wrapper'>
    <h1 class='page-title'>Кабинет организатора</h1>

    <div style='display:flex; justify-content:flex-end; margin-bottom:16px;'>
        <button class='btn btn-primary' style='width:auto; padding:10px 24px;' onclick="window.location.href='/apply'">+ Создать мероприятие</button>
    </div>

    <div class='admin-card'>
        <div class='admin-card-title'>Мои мероприятия</div>
        <div id='events-container'>
            <p style='color:#666; text-align:center;'>Загрузка...</p>
        </div>
    </div>
</div>

<div id='modal-delete' class='modal-overlay'>
    <div class='modal-box'>
        <p id='modal-delete-text'>Удалить мероприятие?</p>
        <div class='modal-btns'>
            <button class='btn btn-danger' onclick='performDelete()'>Да, удалить</button>
            <button class='btn' onclick='closeModal("modal-delete")'>Отмена</button>
        </div>
    </div>
</div>

<div id='modal-edit' class='modal-overlay'>
    <div class='modal-box' style='width:400px;'>
        <p style='font-size:16px; font-weight:500; margin-bottom:16px;'>Редактировать мероприятие</p>
        <div class='form-group'>
            <label>Название</label>
            <input type='text' id='edit-title' placeholder='Название мероприятия'>
        </div>
        <div class='form-group'>
            <label>Описание</label>
            <textarea id='edit-description' placeholder='Описание' style='height:80px; resize:vertical;'></textarea>
        </div>
        <div class='modal-btns'>
            <button class='btn btn-primary' onclick='performEdit()'>Сохранить</button>
            <button class='btn' onclick='closeModal("modal-edit")'>Отмена</button>
        </div>
    </div>
</div>

<div id='modal-participants' class='modal-overlay'>
    <div class='modal-box' style='width:500px;'>
        <p style='font-size:16px; font-weight:500; margin-bottom:16px;'>Участники мероприятия</p>
        <div id='participants-list'></div>
        <div style='margin-top:16px; text-align:center;'>
            <button class='btn' onclick='closeModal("modal-participants")'>Закрыть</button>
        </div>
    </div>
</div>

<script>
var currentEventId = 0;

async function loadEvents() {
    const response = await fetch('/api/admin/events');
    if (!response.ok) {
        document.getElementById('events-container').innerHTML = '<p style="color:#c0392b; text-align:center;">Нет доступа!</p>';
        return;
    }
    const events = await response.json();
    if (events.length === 0) {
        document.getElementById('events-container').innerHTML = '<p style="color:#666; text-align:center;">У вас пока нет мероприятий. Создайте первое!</p>';
        return;
    }
    var rows = events.map(function(e) {
        return '<tr>' +
            '<td>' + e.id + '</td>' +
            '<td>' + e.title + '</td>' +
            '<td>' + new Date(e.start).toLocaleDateString("ru-RU") + '</td>' +
            '<td>' + new Date(e.end).toLocaleDateString("ru-RU") + '</td>' +
            '<td>' + (e.is_public ? 'Да' : 'Нет') + '</td>' +
            '<td style="display:flex; gap:6px;">' +
                '<button class="btn" style="width:auto; padding:6px 12px; font-size:12px;" onclick="openParticipants(' + e.id + ')">Участники</button>' +
                '<button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:12px;" onclick="openEdit(' + e.id + ', \'' + e.title + '\', \'' + (e.description || '') + '\')">Изменить</button>' +
                '<button class="btn btn-danger" style="width:auto; padding:6px 12px; font-size:12px;" onclick="openDelete(' + e.id + ', \'' + e.title + '\')">Удалить</button>' +
            '</td>' +
        '</tr>';
    }).join('');
    document.getElementById('events-container').innerHTML =
        '<table class="admin-table">' +
            '<thead><tr><th>ID</th><th>Название</th><th>Начало</th><th>Конец</th><th>Публичное</th><th>Действия</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
        '</table>';
}

function openDelete(id, name) {
    currentEventId = id;
    document.getElementById('modal-delete-text').textContent = 'Удалить мероприятие "' + name + '"?';
    document.getElementById('modal-delete').classList.add('active');
}

async function performDelete() {
    closeModal('modal-delete');
    const response = await fetch('/api/admin/events/' + currentEventId, { method: 'DELETE' });
    if (response.ok) loadEvents();
}

function openEdit(id, title, description) {
    currentEventId = id;
    document.getElementById('edit-title').value = title;
    document.getElementById('edit-description').value = description;
    document.getElementById('modal-edit').classList.add('active');
}

async function performEdit() {
    const title = document.getElementById('edit-title').value.trim();
    const description = document.getElementById('edit-description').value.trim();
    if (!title) return;
    const response = await fetch('/api/admin/events/' + currentEventId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, description: description })
    });
    if (response.ok) {
        closeModal('modal-edit');
        loadEvents();
    }
}

async function openParticipants(eventId) {
    currentEventId = eventId;
    document.getElementById('participants-list').innerHTML = '<p style="color:#666; text-align:center;">Загрузка...</p>';
    document.getElementById('modal-participants').classList.add('active');
    const response = await fetch('/api/admin/participants/' + eventId);
    if (response.ok) {
        const participants = await response.json();
        if (participants.length === 0) {
            document.getElementById('participants-list').innerHTML = '<p style="color:#666; text-align:center;">Нет участников</p>';
        } else {
            var rows = participants.map(function(p) {
                return '<tr><td>' + p.username + '</td><td>' + p.email + '</td><td>' + p.status + '</td></tr>';
            }).join('');
            document.getElementById('participants-list').innerHTML =
                '<table class="admin-table">' +
                    '<thead><tr><th>Логин</th><th>Email</th><th>Статус</th></tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                '</table>';
        }
    }
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

loadEvents();
</script>
</body>
</html>
