<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Забыли пароль</title>
    <link rel='stylesheet' href='/static/css/style.css'>
</head>
<body>
<div class='login-page'>
    <div class='login-box'>
        <div class='login-form-side'>
            <h2>Забыли пароль?</h2>
            <p>Введите email указанный при регистрации — мы пришлём инструкцию по восстановлению</p>
            <div id='flash-container'></div>
            <form id='forgot-form'>
                <div class='form-group'>
                    <label>Электронная почта</label>
                    <input type='email' id='email' placeholder='Введите ваш email' required>
                    <span class='error-text' id='email-error'></span>
                </div>
                <button type='submit' class='btn btn-primary'>Отправить</button>
                <div class='login-links'>
                    <span>Вспомнили пароль? <a href='/login' class='link-dark'>Войти</a></span>
                </div>
            </form>
            <div id='success-msg' style='display:none; margin-top:20px;'>
                <div class='flash-message flash-success'>
                    Инструкция отправлена на вашу почту !
                </div>
                <div class='login-links' style='margin-top:12px;'>
                    <a href='/login' class='link-dark'>Вернуться на страницу входа</a>
                </div>
            </div>
        </div>
        <div class='login-logo'>
            <img src='/static/img/logo.png' alt='Логотип'>
        </div>
    </div>
</div>
<script>
function showError(fieldId, errorId, message) {
    document.getElementById(fieldId).classList.add('input-error');
    if (message) document.getElementById(errorId).textContent = message + ' !';
}

function clearErrors() {
    document.getElementById('email').classList.remove('input-error');
    document.getElementById('email-error').textContent = '';
    document.getElementById('flash-container').innerHTML = '';
}

document.getElementById('forgot-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearErrors();
    const email = document.getElementById('email').value.trim();

    if (!email) { showError('email', 'email-error', 'Введите email'); return; }

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) { showError('email', 'email-error', 'Введите корректный email'); return; }

    document.getElementById('forgot-form').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
});
</script>
</body>
</html>
