<!DOCTYPE html>
<html lang='ru'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Панель управления</title>
    <link rel='stylesheet' href='/static/css/style.css'>
</head>
<body>
<header>
    <nav class='nav-left'>
        <a href='/index'><span class='nav-dot'></span> Главная страница</a>
        <a href='/events'><span class='nav-dot'></span> Записи на мероприятия</a>
    </nav>
    <div class='logo'>
        <img src='/static/img/logo.png' alt='Логотип'>
    </div>
    <nav class='nav-right' id='nav-right'>
        <a href='/admin'><span class='nav-dot'></span> Панель управления</a>
        <a href='/profile'><span class='nav-dot'></span> Личный кабинет</a>
    </nav>
</header>

<div class='page-wrapper'>
    <h1 class='page-title'>Панель управления</h1>
    <div class='admin-tabs'>
        <button class='admin-tab active' onclick="showTab('users', this)">Пользователи</button>
        <button class='admin-tab' onclick="showTab('pending', this)">На проверке</button>
        <button class='admin-tab' onclick="showTab('events', this)">Все мероприятия</button>
        <button class='admin-tab' onclick="showTab('org-req', this)">Заявки на организатора</button>
    </div>

    <div id='tab-users'>
        <div class='admin-card'>
            <div class='admin-card-title'>Список пользователей</div>
            <div id='users-container'><p style='color:#666; text-align:center;'>Загрузка...</p></div>
        </div>
    </div>

    <div id='tab-pending' style='display:none;'>
        <div class='admin-card'>
            <div class='admin-card-title'>Заявки на проверке</div>
            <div id='pending-container'><p style='color:#666; text-align:center;'>Загрузка...</p></div>
        </div>
    </div>

    <div id='tab-events' style='display:none;'>
        <div class='admin-card'>
            <div class='admin-card-title'>Все мероприятия</div>
            <div id='events-container'><p style='color:#666; text-align:center;'>Загрузка...</p></div>
        </div>
    </div>
</div>

<div id='modal' class='modal-overlay'>
    <div class='modal-box'>
        <p id='modal-text'>Вы уверены?</p>
        <div class='modal-btns'>
            <button class='btn btn-danger' id='modal-confirm'>Да, удалить</button>
            <button class='btn' onclick='closeModal()'>Отмена</button>
        </div>
    </div>
</div>

<div id='modal-participants' class='modal-overlay'>
    <div class='modal-box' style='width:540px;'>
        <p style='font-size:16px; font-weight:500; margin-bottom:16px;' id='participants-title'>Участники</p>
        <div id='participants-list'></div>
        <div style='margin-top:16px; text-align:center;'>
            <button class='btn' onclick='closeParticipants()'>Закрыть</button>
        </div>
    </div>
</div>


    <div id='tab-org-req' style='display:none;'>
        <div class='admin-card'>
            <div class='admin-card-title'>Заявки на роль организатора</div>
            <div id='org-req-container'><p style='color:#666; text-align:center;'>Загрузка...</p></div>
        </div>
    </div>
<script>
var deleteType = '';
var deleteId = 0;
var roles = { admin: 'Администратор', organizer: 'Организатор', employee: 'Сотрудник' };
var statuses = { pending: 'На проверке', approved: 'Одобрено', rejected: 'Отклонено' };
var statusColors = { pending: 'role-organizer', approved: 'role-employee', rejected: 'role-admin' };

function formatDT(dateStr) {
    var d = new Date(dateStr);
    return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

async function loadNavRole() {
    try {
        const response = await fetch('/api/profile');
        if (response.ok) {
            const data = await response.json();
            const nav = document.getElementById('nav-right');
            if (data.role_code === 'organizer') {
                nav.innerHTML = "<a href='/organizer'><span class='nav-dot'></span> Мои мероприятия</a>" +
                    "<a href='/apply'><span class='nav-dot'></span> Оставление заявки</a>" +
                    "<a href='/profile'><span class='nav-dot'></span> Личный кабинет</a>";
            } else {
                nav.innerHTML = "<a href='/admin'><span class='nav-dot'></span> Панель управления</a>" +
                    "<a href='/apply'><span class='nav-dot'></span> Оставление заявки</a>" +
                    "<a href='/profile'><span class='nav-dot'></span> Личный кабинет</a>";
            }
        }
    } catch(e) {}
}

async function loadUsers() {
    const response = await fetch('/api/admin/users');
    if (!response.ok) {
        document.getElementById('users-container').innerHTML = '<p style="color:#c0392b; text-align:center;">Нет доступа!</p>';
        return;
    }
    const users = await response.json();
    if (users.length === 0) {
        document.getElementById('users-container').innerHTML = '<p style="color:#666; text-align:center;">Нет пользователей</p>';
        return;
    }
    var rows = users.map(function(u) {
        return '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td>' + u.email + '</td>' +
            '<td><span class="role-badge role-' + u.role + '">' + (roles[u.role] || u.role) + '</span></td>' +
            '<td>' + u.created_at + '</td>' +
            '<td><button class="btn btn-danger" style="width:auto; padding:6px 14px; font-size:12px;" onclick="confirmDelete(\'user\', ' + u.id + ', \'' + u.username + '\')">Удалить</button></td></tr>';
    }).join('');
    document.getElementById('users-container').innerHTML =
        '<table class="admin-table"><thead><tr><th>ID</th><th>Логин</th><th>Email</th><th>Роль</th><th>Дата</th><th>Действия</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

async function loadPending() {
    const response = await fetch('/api/admin/events/pending');
    if (!response.ok) {
        document.getElementById('pending-container').innerHTML = '<p style="color:#c0392b; text-align:center;">Нет доступа!</p>';
        return;
    }
    const events = await response.json();
    if (events.length === 0) {
        document.getElementById('pending-container').innerHTML = '<p style="color:#666; text-align:center;">Нет заявок на проверке</p>';
        return;
    }
    var rows = events.map(function(e) {
        return '<tr>' +
            '<td>' + e.id + '</td>' +
            '<td>' + e.title + '</td>' +
            '<td>' + (e.location || '-') + '</td>' +
            '<td style="max-width:180px; font-size:12px;">' + (e.description || '-') + '</td>' +
            '<td>' + formatDT(e.start) + '</td>' +
            '<td>' + formatDT(e.end) + '</td>' +
            '<td style="display:flex; gap:6px;">' +
                '<button class="btn btn-primary" style="width:auto; padding:6px 12px; font-size:12px; background:#27500a; border-color:#27500a;" onclick="approveEvent(' + e.id + ')">Одобрить</button>' +
                '<button class="btn btn-danger" style="width:auto; padding:6px 12px; font-size:12px;" onclick="rejectEvent(' + e.id + ')">Отклонить</button>' +
            '</td></tr>';
    }).join('');
    document.getElementById('pending-container').innerHTML =
        '<table class="admin-table"><thead><tr><th>ID</th><th>Название</th><th>Место</th><th>Описание</th><th>Начало</th><th>Конец</th><th>Действия</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

async function approveEvent(id) {
    const response = await fetch('/api/admin/events/' + id + '/approve', { method: 'POST' });
    if (response.ok) loadPending();
}

async function rejectEvent(id) {
    const response = await fetch('/api/admin/events/' + id + '/reject', { method: 'POST' });
    if (response.ok) loadPending();
}

async function loadEvents() {
    const response = await fetch('/api/admin/events');
    if (!response.ok) {
        document.getElementById('events-container').innerHTML = '<p style="color:#c0392b; text-align:center;">Нет доступа!</p>';
        return;
    }
    const events = await response.json();
    if (events.length === 0) {
        document.getElementById('events-container').innerHTML = '<p style="color:#666; text-align:center;">Нет мероприятий</p>';
        return;
    }
    var rows = events.map(function(e) {
        return '<tr>' +
            '<td>' + e.id + '</td>' +
            '<td>' + e.title + '</td>' +
            '<td>' + (e.location || '-') + '</td>' +
            '<td>' + formatDT(e.start) + '</td>' +
            '<td><span class="role-badge ' + (statusColors[e.status] || '') + '">' + (statuses[e.status] || e.status) + '</span></td>' +
            '<td style="display:flex; gap:6px;">' +
                '<button class="btn" style="width:auto; padding:6px 12px; font-size:12px;" onclick="openParticipants(' + e.id + ', \'' + e.title + '\')">Участники</button>' +
                '<button class="btn btn-danger" style="width:auto; padding:6px 12px; font-size:12px;" onclick="confirmDelete(\'event\', ' + e.id + ', \'' + e.title + '\')">Удалить</button>' +
            '</td></tr>';
    }).join('');
    document.getElementById('events-container').innerHTML =
        '<table class="admin-table"><thead><tr><th>ID</th><th>Название</th><th>Место</th><th>Начало</th><th>Статус</th><th>Действия</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

async function openParticipants(eventId, eventTitle) {
    document.getElementById('participants-title').textContent = 'Участники: ' + eventTitle;
    document.getElementById('participants-list').innerHTML = '<p style="color:#666; text-align:center;">Загрузка...</p>';
    document.getElementById('modal-participants').classList.add('active');
    const response = await fetch('/api/admin/participants/' + eventId);
    if (response.ok) {
        const participants = await response.json();
        if (participants.length === 0) {
            document.getElementById('participants-list').innerHTML = '<p style="color:#666; text-align:center;">Нет участников</p>';
        } else {
            var rows = participants.map(function(p) {
                var statusClass = p.status === 'confirmed' ? 'role-employee' : p.status === 'cancelled' ? 'role-admin' : 'role-organizer';
                return '<tr><td>' + p.username + '</td><td>' + p.email + '</td>' +
                    '<td><span class="role-badge ' + statusClass + '">' + (p.status === 'confirmed' ? 'Подтверждён' : p.status === 'cancelled' ? 'Отменён' : 'Ожидает') + '</span></td></tr>';
            }).join('');
            document.getElementById('participants-list').innerHTML =
                '<table class="admin-table"><thead><tr><th>Логин</th><th>Email</th><th>Статус</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }
    }
}

function closeParticipants() {
    document.getElementById('modal-participants').classList.remove('active');
}

function showTab(tab, btn) {
    ['users', 'pending', 'events', 'org-req'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = 'none';
    });
    document.getElementById('tab-' + tab).style.display = 'block';
    document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    if (tab === 'pending') loadPending();
    else if (tab === 'events') loadEvents();
    else if (tab === 'org-req') loadOrgReq();
}

function confirmDelete(type, id, name) {
    deleteType = type;
    deleteId = id;
    document.getElementById('modal-text').textContent = type === 'user'
        ? 'Удалить пользователя "' + name + '"?'
        : 'Удалить мероприятие "' + name + '"?';
    document.getElementById('modal-confirm').onclick = performDelete;
    document.getElementById('modal').classList.add('active');
}

async function performDelete() {
    closeModal();
    var url = deleteType === 'user' ? '/api/admin/users/' + deleteId : '/api/admin/events/' + deleteId;
    const response = await fetch(url, { method: 'DELETE' });
    if (response.ok) {
        if (deleteType === 'user') loadUsers();
        else loadEvents();
    }
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}


async function loadOrgReq() {
    const r = await fetch('/api/admin/organizer-requests');
    const c = document.getElementById('org-req-container');
    if (!r.ok) { c.innerHTML = '<p style="color:#c0392b;text-align:center;">Нет доступа</p>'; return; }
    const users = await r.json();
    if (!users.length) { c.innerHTML = '<p style="color:#666;text-align:center;">Нет заявок</p>'; return; }
    var rows = users.map(u => '<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+u.email+'</td><td>'+u.created_at+'</td><td style="display:flex;gap:6px;"><button class="btn btn-primary" style="width:auto;padding:6px 12px;font-size:12px;background:#27500a;border-color:#27500a" onclick="approveOrg('+u.id+')">Одобрить</button><button class="btn btn-danger" style="width:auto;padding:6px 12px;font-size:12px;" onclick="rejectOrg('+u.id+')">Отклонить</button></td></tr>').join('');
    c.innerHTML = '<table class="admin-table"><thead><tr><th>ID</th><th>Логин</th><th>Email</th><th>Дата</th><th>Действия</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
async function approveOrg(id) { const r = await fetch('/api/admin/organizer-requests/'+id+'/approve',{method:'POST'}); if(r.ok) loadOrgReq(); }
async function rejectOrg(id) { const r = await fetch('/api/admin/organizer-requests/'+id+'/reject',{method:'POST'}); if(r.ok) loadOrgReq(); }
loadNavRole();
loadUsers();
</script>
</body>
</html>
